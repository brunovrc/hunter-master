<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Hunter Master{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Inter', 'sans-serif'] },
          colors: {
            accent: '#fde047',
            surface: '#18181b',
            card: '#1c1c1f',
            border: '#2a2a2e',
          },
          borderRadius: { '4xl': '2rem' },
          keyframes: {
            pulse2: { '0%,100%': { opacity: '1' }, '50%': { opacity: '.4' } }
          },
          animation: { pulse2: 'pulse2 2s ease-in-out infinite' }
        }
      }
    }
  </script>
  <style>
    * { font-family: 'Inter', sans-serif; }
    body { background: #0f0f11; }

    .sidebar-link {
      display: flex; align-items: center; gap: 10px;
      padding: 9px 12px; border-radius: 10px;
      color: #71717a; font-size: 13.5px; font-weight: 500;
      transition: all .15s; cursor: pointer; text-decoration: none;
      position: relative;
    }
    .sidebar-link:hover { color: #fff; background: rgba(255,255,255,.05); }
    .sidebar-link.active {
      color: #fff; background: rgba(253,224,71,.08);
    }
    .sidebar-link.active::before {
      content: ''; position: absolute; left: 0; top: 20%; bottom: 20%;
      width: 3px; border-radius: 0 3px 3px 0; background: #fde047;
    }

    .card { background: #1c1c1f; border-radius: 20px; border: 1px solid #2a2a2e; }
    .card-yellow { background: #fde047; border-radius: 20px; border: none; }
    .card-white { background: #f5f5f5; border-radius: 20px; border: none; }

    .stat-number {
      font-size: 2.5rem; font-weight: 800; line-height: 1; letter-spacing: -0.04em;
    }
    .badge {
      display: inline-flex; align-items: center; padding: 3px 10px;
      border-radius: 999px; font-size: 11px; font-weight: 600; letter-spacing: .02em;
    }
    .badge-buy   { background: rgba(34,197,94,.15); color: #4ade80; border: 1px solid rgba(34,197,94,.25); }
    .badge-neg   { background: rgba(234,179,8,.15);  color: #fbbf24; border: 1px solid rgba(234,179,8,.25); }
    .badge-flag  { background: rgba(249,115,22,.15); color: #fb923c; border: 1px solid rgba(249,115,22,.25); }
    .badge-refuse{ background: rgba(113,113,122,.12); color: #71717a; border: 1px solid rgba(113,113,122,.2); }

    .btn-yellow {
      background: #fde047; color: #0f0f11; font-weight: 700; font-size: 13px;
      padding: 8px 18px; border-radius: 10px; border: none; cursor: pointer;
      transition: all .15s; display: inline-flex; align-items: center; gap: 6px;
    }
    .btn-yellow:hover { background: #fef08a; transform: translateY(-1px); }
    .btn-ghost {
      background: rgba(255,255,255,.06); color: #a1a1aa; font-weight: 500; font-size: 13px;
      padding: 8px 16px; border-radius: 10px; border: 1px solid #2a2a2e; cursor: pointer;
      transition: all .15s; display: inline-flex; align-items: center; gap: 6px;
      text-decoration: none;
    }
    .btn-ghost:hover { background: rgba(255,255,255,.1); color: #fff; }

    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #3f3f46; border-radius: 4px; }

    .listing-img {
      width: 100%; aspect-ratio: 4/3; object-fit: cover;
      background: #27272a; border-radius: 14px 14px 0 0;
    }
    .listing-img-wrap {
      position: relative; overflow: hidden; border-radius: 14px 14px 0 0; background: #27272a;
    }
    .listing-img-placeholder {
      width: 100%; aspect-ratio: 4/3;
      display: flex; align-items: center; justify-content: center;
      background: #27272a; font-size: 2.5rem;
    }

    .score-ring {
      width: 44px; height: 44px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; font-weight: 800;
    }
  </style>
</head>
<body class="min-h-screen text-white">
<div class="flex h-screen overflow-hidden">

  <!-- ── Sidebar ── -->
  <aside style="width:220px; min-width:220px; background:#141416; border-right:1px solid #2a2a2e; display:flex; flex-direction:column; padding:0;">

    <!-- Logo -->
    <div style="padding:22px 20px 18px; border-bottom:1px solid #2a2a2e;">
      <div style="display:flex; align-items:center; gap:10px;">
        <div style="width:34px; height:34px; background:#fde047; border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:17px; flex-shrink:0;">🏹</div>
        <div>
          <div style="font-size:14px; font-weight:700; color:#fff; line-height:1.2;">Hunter Master</div>
          <div style="font-size:11px; color:#52525b;">v1.0 · Operação</div>
        </div>
      </div>
    </div>

    <!-- Nav -->
    <nav style="flex:1; padding:14px 12px; display:flex; flex-direction:column; gap:2px;">
      <div style="font-size:10px; font-weight:600; color:#3f3f46; text-transform:uppercase; letter-spacing:.08em; padding:0 12px; margin-bottom:6px; margin-top:4px;">Menu</div>
      <a href="/feed" class="sidebar-link {% if active_page == 'feed' %}active{% endif %}">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
        Feed
      </a>
      <a href="/stats" class="sidebar-link {% if active_page == 'stats' %}active{% endif %}">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
        Estatísticas
      </a>
      <a href="/control" class="sidebar-link {% if active_page == 'control' %}active{% endif %}">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/><path d="M4.93 4.93a10 10 0 0 0 0 14.14"/></svg>
        Controle
      </a>
      <a href="/history" class="sidebar-link {% if active_page == 'history' %}active{% endif %}">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
        Comprados
      </a>
      <a href="/discarded" class="sidebar-link {% if active_page == 'discarded' %}active{% endif %}">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>
        Descartados
      </a>
    </nav>

    <!-- Bottom -->
    <div style="padding:14px 12px; border-top:1px solid #2a2a2e;">
      <a href="/logout" class="sidebar-link" style="color:#ef4444;">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        Sair
      </a>
    </div>
  </aside>

  <!-- ── Main ── -->
  <main style="flex:1; overflow-y:auto;">
    {% block content %}{% endblock %}
  </main>

</div>

<!-- Toast -->
<div id="toast" style="position:fixed;bottom:24px;right:24px;z-index:9999;display:none;">
  <div id="toast-inner" style="background:#1c1c1f;border:1px solid #2a2a2e;color:#fff;padding:12px 18px;border-radius:12px;font-size:13px;font-weight:500;box-shadow:0 8px 32px rgba(0,0,0,.5);max-width:320px;"></div>
</div>

<script>
  let toastTimer;
  function showToast(msg, err) {
    const t = document.getElementById('toast');
    const i = document.getElementById('toast-inner');
    i.textContent = msg;
    i.style.borderColor = err ? '#7f1d1d' : '#2a2a2e';
    i.style.color = err ? '#fca5a5' : '#fff';
    t.style.display = 'block';
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.style.display = 'none', 3200);
  }
  async function postForm(url, data, btn) {
    const prevText = btn ? btn.textContent : null;
    if (btn) { btn.disabled = true; btn.textContent = '...'; }
    const body = new FormData();
    Object.entries(data).forEach(([k,v]) => body.append(k, v));
    try {
      const r = await fetch(url, { method:'POST', body });
      const j = await r.json();
      if (j.ok !== false) showToast(j.message || 'Feito!', false);
      else showToast(j.message || 'Erro', true);
      return j;
    } catch(e) {
      showToast('Erro de conexão', true);
      return { ok: false };
    } finally {
      if (btn) { btn.disabled = false; btn.textContent = prevText; }
    }
  }
</script>
{% block scripts %}{% endblock %}
</body>
</html>
