<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hunter Master</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { font-family: 'Inter', sans-serif; box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0f0f11; color: #fff; min-height: 100vh; display: flex; align-items: center; justify-content: center; }

    .wrap {
      width: 100%; max-width: 380px; padding: 24px;
    }
    .logo-box {
      text-align: center; margin-bottom: 36px;
    }
    .logo-icon {
      width: 56px; height: 56px; background: #fde047; border-radius: 16px;
      display: flex; align-items: center; justify-content: center; font-size: 26px;
      margin: 0 auto 16px;
    }
    .logo-title { font-size: 22px; font-weight: 800; color: #fff; }
    .logo-sub { font-size: 13px; color: #52525b; margin-top: 4px; }

    .card {
      background: #1c1c1f; border: 1px solid #2a2a2e; border-radius: 20px; padding: 28px;
    }
    .error-box {
      background: rgba(239,68,68,.1); border: 1px solid rgba(239,68,68,.25);
      color: #fca5a5; padding: 10px 14px; border-radius: 10px;
      font-size: 13px; margin-bottom: 20px;
    }
    label {
      display: block; font-size: 11px; font-weight: 600; color: #71717a;
      text-transform: uppercase; letter-spacing: .06em; margin-bottom: 6px;
    }
    input {
      width: 100%; background: #141416; border: 1px solid #2a2a2e; border-radius: 10px;
      padding: 11px 14px; color: #fff; font-size: 14px; outline: none;
      transition: border-color .15s;
    }
    input:focus { border-color: #fde047; }
    input::placeholder { color: #3f3f46; }
    .field { margin-bottom: 16px; }
    .btn-submit {
      width: 100%; background: #fde047; color: #0f0f11; font-weight: 700; font-size: 14px;
      padding: 12px; border-radius: 10px; border: none; cursor: pointer;
      margin-top: 8px; transition: all .15s;
    }
    .btn-submit:hover { background: #fef08a; transform: translateY(-1px); }
    .footer-note { text-align: center; font-size: 12px; color: #3f3f46; margin-top: 20px; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="logo-box">
      <div class="logo-icon">🏹</div>
      <div class="logo-title">Hunter Master</div>
      <div class="logo-sub">Acesso restrito — Equipe Bruno & Marcelo</div>
    </div>

    <div class="card">
      {% if error %}
      <div class="error-box">{{ error }}</div>
      {% endif %}

      <form method="POST" action="/login">
        <div class="field">
          <label>Usuário</label>
          <input name="username" type="text" autocomplete="username" autofocus placeholder="admin">
        </div>
        <div class="field">
          <label>Senha</label>
          <input name="password" type="password" autocomplete="current-password" placeholder="••••••••">
        </div>
        <button type="submit" class="btn-submit">Entrar →</button>
      </form>
    </div>

    <div class="footer-note">Hunter Master · Garimpador de camisetas raras</div>
  </div>
</body>
</html>
