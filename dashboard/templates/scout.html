<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0">
<title>Hunter Scout</title>
<link rel="manifest" href="/static/scout/manifest.json">
<link rel="icon" href="/static/scout/icon.svg">
<link rel="apple-touch-icon" href="/static/scout/icon.svg">
<meta name="theme-color" content="#09090b">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #09090b; --card: #111113; --card-hi: #18181b;
    --border: #1f1f23; --border-hi: #27272a;
    --fg3: #71717a; --fg2: #a1a1aa; --fg1: #d4d4d8; --fg: #fafafa;
    --accent: #fde047; --accent-lo: rgba(253,224,71,.08);
    --green: #4ade80; --yellow: #fbbf24; --red: #f87171;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; overscroll-behavior-y: contain; }
  body {
    font-family: 'Inter', system-ui, sans-serif; background: var(--bg); color: var(--fg);
    -webkit-font-smoothing: antialiased; padding-bottom: env(safe-area-inset-bottom);
  }
  .wrap { max-width: 560px; margin: 0 auto; padding: 0 16px 24px; }

  /* Header */
  header {
    position: sticky; top: 0; z-index: 10; background: rgba(9,9,11,.92); backdrop-filter: blur(10px);
    border-bottom: 1px solid var(--border);
    padding: calc(env(safe-area-inset-top) + 12px) 16px 12px;
  }
  .header-row { max-width: 560px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; }
  .brand { display: flex; align-items: center; gap: 8px; }
  .brand-mark { width: 26px; height: 26px; background: var(--accent); border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 13px; }
  .brand-name { font-size: 14px; font-weight: 800; letter-spacing: -.02em; }
  .tally { display: flex; align-items: center; gap: 10px; font-size: 12px; color: var(--fg3); }
  .tally b { color: var(--accent); font-weight: 700; }

  /* Session bar */
  .session-bar {
    margin-top: 12px; padding: 10px 12px; border-radius: 10px;
    background: var(--card); border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between; gap: 8px;
  }
  .session-bar input {
    background: transparent; border: none; color: var(--fg); font-size: 13px; font-weight: 600;
    outline: none; flex: 1; min-width: 0;
  }
  .session-bar input::placeholder { color: var(--fg3); font-weight: 500; }
  .session-btn {
    font-size: 11.5px; font-weight: 700; color: #09090b; background: var(--accent);
    border: none; border-radius: 7px; padding: 6px 10px; white-space: nowrap; cursor: pointer;
  }
  .session-btn.ghost { background: transparent; color: var(--fg3); border: 1px solid var(--border-hi); }

  /* Capture grid */
  .section-title { font-size: 12px; font-weight: 700; color: var(--fg2); text-transform: uppercase; letter-spacing: .06em; margin: 20px 0 10px; }
  .photo-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
  .photo-tile {
    aspect-ratio: 3/4; border-radius: 12px; border: 1.5px dashed var(--border-hi);
    display: flex; align-items: center; justify-content: center; position: relative;
    background: var(--card); overflow: hidden; cursor: pointer;
  }
  .photo-tile.filled { border-style: solid; border-color: var(--border); }
  .photo-tile img { width: 100%; height: 100%; object-fit: cover; }
  .photo-tile .plus { font-size: 28px; color: var(--fg3); font-weight: 300; }
  .photo-tile .label { position: absolute; bottom: 4px; left: 0; right: 0; text-align: center; font-size: 9px; color: var(--fg3); }
  .photo-remove {
    position: absolute; top: 4px; right: 4px; width: 22px; height: 22px; border-radius: 50%;
    background: rgba(0,0,0,.7); color: #fff; border: none; font-size: 14px; line-height: 1;
    display: flex; align-items: center; justify-content: center; cursor: pointer;
  }

  textarea.notes {
    width: 100%; margin-top: 14px; background: var(--card); border: 1px solid var(--border-hi);
    border-radius: 10px; padding: 11px 13px; color: var(--fg); font-size: 13.5px; font-family: inherit;
    resize: none; outline: none; min-height: 52px;
  }
  textarea.notes:focus { border-color: var(--accent); }
  textarea.notes::placeholder { color: var(--fg3); }

  .btn-eval {
    width: 100%; margin-top: 16px; padding: 15px; border-radius: 12px; border: none;
    background: var(--accent); color: #09090b; font-weight: 800; font-size: 15px; cursor: pointer;
    display: flex; align-items: center; justify-content: center; gap: 8px;
    transition: transform .1s, opacity .1s;
  }
  .btn-eval:active { transform: scale(.98); }
  .btn-eval:disabled { opacity: .4; cursor: not-allowed; }

  .spinner {
    width: 16px; height: 16px; border: 2px solid rgba(9,9,11,.25); border-top-color: #09090b;
    border-radius: 50%; animation: spin .7s linear infinite; display: none;
  }
  .btn-eval.loading .spinner { display: block; }
  .btn-eval.loading .btn-label { display: none; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Result card */
  .result { margin-top: 22px; display: none; }
  .result.show { display: block; animation: fadein .25s ease; }
  @keyframes fadein { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }

  .rec-banner {
    border-radius: 12px; padding: 14px 16px; margin-bottom: 14px;
    display: flex; align-items: center; justify-content: space-between; gap: 10px;
  }
  .rec-banner.buy      { background: rgba(34,197,94,.12);  border: 1px solid rgba(34,197,94,.3); }
  .rec-banner.negotiate{ background: rgba(234,179,8,.12);  border: 1px solid rgba(234,179,8,.3); }
  .rec-banner.verify   { background: rgba(248,113,113,.12); border: 1px solid rgba(248,113,113,.3); }
  .rec-banner .rec-label { font-size: 15px; font-weight: 800; }
  .rec-banner.buy .rec-label { color: var(--green); }
  .rec-banner.negotiate .rec-label { color: var(--yellow); }
  .rec-banner.verify .rec-label { color: var(--red); }
  .rec-banner .rec-reason { font-size: 12px; color: var(--fg2); margin-top: 3px; }

  .price-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 14px; }
  .price-box { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 12px 14px; }
  .price-box .k { font-size: 10.5px; color: var(--fg3); text-transform: uppercase; letter-spacing: .05em; font-weight: 600; }
  .price-box .v { font-size: 19px; font-weight: 800; margin-top: 3px; color: var(--fg); }
  .price-box.offer .v { color: var(--accent); }

  .info-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 14px 16px; margin-bottom: 10px; }
  .info-row { display: flex; justify-content: space-between; align-items: center; padding: 7px 0; font-size: 13px; border-bottom: 1px solid var(--border); }
  .info-row:last-child { border-bottom: none; }
  .info-row .lbl { color: var(--fg3); }
  .info-row .val { color: var(--fg1); font-weight: 600; text-align: right; max-width: 60%; }

  .badge-row { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; }
  .mini-badge { font-size: 10.5px; font-weight: 700; padding: 4px 9px; border-radius: 6px; }
  .mini-badge.ok   { background: rgba(34,197,94,.12); color: var(--green); border: 1px solid rgba(34,197,94,.25); }
  .mini-badge.warn { background: rgba(248,113,113,.12); color: var(--red); border: 1px solid rgba(248,113,113,.25); }
  .mini-badge.neutral { background: var(--card-hi); color: var(--fg3); border: 1px solid var(--border-hi); }

  .auth-bar-wrap { margin-top: 4px; }
  .auth-bar-track { height: 6px; border-radius: 99px; background: var(--card-hi); overflow: hidden; margin-top: 5px; }
  .auth-bar-fill { height: 100%; border-radius: 99px; transition: width .4s ease; }

  .notes-box { font-size: 12.5px; color: var(--fg2); line-height: 1.5; margin-top: 8px; }

  /* Comparáveis */
  .comp-list { display: flex; flex-direction: column; gap: 6px; margin-top: 10px; }
  .comp-item {
    display: flex; align-items: center; justify-content: space-between; gap: 10px;
    background: var(--card-hi); border: 1px solid var(--border-hi); border-radius: 9px;
    padding: 9px 11px; text-decoration: none;
  }
  .comp-item .comp-info { min-width: 0; flex: 1; }
  .comp-item .comp-title {
    font-size: 12px; font-weight: 600; color: var(--fg1);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .comp-item .comp-meta { font-size: 10.5px; color: var(--fg3); margin-top: 2px; text-transform: capitalize; }
  .comp-item .comp-price { font-size: 13px; font-weight: 800; color: var(--accent); white-space: nowrap; }
  .comp-empty { font-size: 12px; color: var(--fg3); margin-top: 8px; }

  /* Pergunta de acompanhamento */
  .ask-box { margin-top: 14px; }
  .ask-row { display: flex; gap: 8px; }
  .ask-row input {
    flex: 1; background: var(--card); border: 1px solid var(--border-hi); border-radius: 10px;
    padding: 11px 13px; color: var(--fg); font-size: 13.5px; outline: none; font-family: inherit;
  }
  .ask-row input:focus { border-color: var(--accent); }
  .ask-row input::placeholder { color: var(--fg3); }
  .ask-send {
    background: var(--accent); color: #09090b; border: none; border-radius: 10px;
    padding: 0 16px; font-weight: 800; font-size: 13px; cursor: pointer; white-space: nowrap;
  }
  .ask-send:disabled { opacity: .4; cursor: not-allowed; }
  .qa-thread { display: flex; flex-direction: column; gap: 8px; margin-top: 10px; }
  .qa-item { font-size: 12.5px; }
  .qa-q { color: var(--fg1); font-weight: 700; }
  .qa-a { color: var(--fg2); line-height: 1.5; margin-top: 3px; }

  .btn-reset {
    width: 100%; margin-top: 4px; padding: 13px; border-radius: 12px;
    background: transparent; border: 1px solid var(--border-hi); color: var(--fg1);
    font-weight: 700; font-size: 14px; cursor: pointer;
  }

  .error-banner {
    display: none; background: rgba(248,113,113,.1); border: 1px solid rgba(248,113,113,.3);
    color: #fca5a5; border-radius: 10px; padding: 11px 14px; font-size: 13px; margin-top: 14px;
  }
  .error-banner.show { display: block; }

  a.history-link {
    display: block; text-align: center; margin-top: 18px; font-size: 12.5px;
    color: var(--fg3); text-decoration: none;
  }
</style>
</head>
<body>

<header>
  <div class="header-row">
    <div class="brand">
      <div class="brand-mark">🔍</div>
      <div class="brand-name">Hunter Scout</div>
    </div>
    <div class="tally" id="tally">0 avaliadas</div>
  </div>
</header>

<div class="wrap">

  <div class="session-bar">
    <input id="collector-name" type="text" placeholder="Nome do colecionador / local">
    <button class="session-btn" id="btn-session" onclick="toggleSession()">Iniciar visita</button>
  </div>

  <div class="section-title">Fotos da camisa (frente, etiqueta, autógrafo/COA)</div>
  <div class="photo-grid" id="photo-grid"></div>

  <textarea class="notes" id="user-notes" placeholder="Contexto extra (opcional): &quot;dono disse que é do Zico, 2019&quot;"></textarea>

  <button class="btn-eval" id="btn-eval" onclick="runEvaluation()" disabled>
    <span class="spinner"></span>
    <span class="btn-label">Avaliar camisa</span>
  </button>

  <div class="error-banner" id="error-banner"></div>

  <div class="result" id="result"></div>

  <a class="history-link" href="/scout/history">Ver histórico completo →</a>
</div>

<script>
const MAX_PHOTOS = 3;
const MAX_DIM = 1600;
const JPEG_QUALITY = 0.72;

let photos = [];        // [{blob, url}]
let sessionId = localStorage.getItem('scout_session_id') || null;
let sessionCount = parseInt(localStorage.getItem('scout_session_count') || '0', 10);
let sessionOfferTotal = parseFloat(localStorage.getItem('scout_session_offer_total') || '0');
let currentEvaluationId = null;

function fmtBRL(v) {
  return 'R$ ' + Number(v).toLocaleString('pt-BR', { maximumFractionDigits: 0 });
}

function updateTally() {
  document.getElementById('tally').innerHTML =
    `<b>${sessionCount}</b> avaliadas &middot; <b>${fmtBRL(sessionOfferTotal)}</b>`;
}

function toggleSession() {
  const btn = document.getElementById('btn-session');
  const nameInput = document.getElementById('collector-name');
  if (!sessionId) {
    const body = new FormData();
    body.append('collector_name', nameInput.value || '');
    body.append('location', '');
    fetch('/scout/api/session/start', { method: 'POST', body })
      .then(r => r.json())
      .then(j => {
        sessionId = String(j.session_id);
        localStorage.setItem('scout_session_id', sessionId);
        sessionCount = 0; sessionOfferTotal = 0;
        localStorage.setItem('scout_session_count', '0');
        localStorage.setItem('scout_session_offer_total', '0');
        updateTally();
        btn.textContent = 'Encerrar visita';
        btn.classList.add('ghost');
        nameInput.disabled = true;
      });
  } else {
    const body = new FormData();
    body.append('session_id', sessionId);
    fetch('/scout/api/session/close', { method: 'POST', body }).finally(() => {
      sessionId = null;
      localStorage.removeItem('scout_session_id');
      btn.textContent = 'Iniciar visita';
      btn.classList.remove('ghost');
      nameInput.disabled = false;
    });
  }
}

function renderGrid() {
  const grid = document.getElementById('photo-grid');
  grid.innerHTML = '';
  const labels = ['Frente', 'Etiqueta', 'Autógrafo/COA'];
  for (let i = 0; i < MAX_PHOTOS; i++) {
    const tile = document.createElement('div');
    tile.className = 'photo-tile' + (photos[i] ? ' filled' : '');
    if (photos[i]) {
      tile.innerHTML = `<img src="${photos[i].url}"><button class="photo-remove" onclick="removePhoto(event,${i})">×</button>`;
    } else {
      tile.innerHTML = `<span class="plus">+</span><span class="label">${labels[i]}</span>`;
      tile.onclick = () => pickPhoto(i);
    }
    grid.appendChild(tile);
  }
  document.getElementById('btn-eval').disabled = photos.filter(Boolean).length === 0;
}

function removePhoto(ev, i) {
  ev.stopPropagation();
  photos[i] = null;
  photos = photos.filter(Boolean);
  renderGrid();
}

function pickPhoto(slot) {
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = 'image/*';
  input.capture = 'environment';
  input.onchange = () => {
    if (!input.files || !input.files[0]) return;
    compressImage(input.files[0]).then((blob) => {
      photos[photos.filter(Boolean).length] = { blob, url: URL.createObjectURL(blob) };
      renderGrid();
    });
  };
  input.click();
}

function compressImage(file) {
  return new Promise((resolve) => {
    const img = new Image();
    const reader = new FileReader();
    reader.onload = (e) => { img.src = e.target.result; };
    img.onload = () => {
      let { width, height } = img;
      if (width > height && width > MAX_DIM) { height = height * (MAX_DIM / width); width = MAX_DIM; }
      else if (height > MAX_DIM) { width = width * (MAX_DIM / height); height = MAX_DIM; }
      const canvas = document.createElement('canvas');
      canvas.width = width; canvas.height = height;
      canvas.getContext('2d').drawImage(img, 0, 0, width, height);
      canvas.toBlob((blob) => resolve(blob), 'image/jpeg', JPEG_QUALITY);
    };
    reader.readAsDataURL(file);
  });
}

function showError(msg) {
  const el = document.getElementById('error-banner');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 5000);
}

async function runEvaluation() {
  const btn = document.getElementById('btn-eval');
  btn.disabled = true; btn.classList.add('loading');
  document.getElementById('error-banner').classList.remove('show');

  const body = new FormData();
  photos.forEach((p) => body.append('images', p.blob, 'photo.jpg'));
  body.append('user_notes', document.getElementById('user-notes').value || '');
  body.append('session_id', sessionId || '');

  try {
    const r = await fetch('/scout/api/evaluate', { method: 'POST', body });
    const j = await r.json();
    if (!r.ok || j.ok === false) {
      showError(j.detail || j.message || 'Erro ao avaliar. Tente novamente.');
      return;
    }
    renderResult(j);
    sessionCount += 1;
    sessionOfferTotal += (j.offer_max || 0);
    localStorage.setItem('scout_session_count', String(sessionCount));
    localStorage.setItem('scout_session_offer_total', String(sessionOfferTotal));
    updateTally();
  } catch (e) {
    showError('Erro de conexão. Verifique o sinal e tente de novo.');
  } finally {
    btn.disabled = photos.filter(Boolean).length === 0;
    btn.classList.remove('loading');
  }
}

function recClass(rec) {
  if (rec === 'COMPRAR') return 'buy';
  if (rec === 'NEGOCIAR') return 'negotiate';
  return 'verify';
}

function authColor(score) {
  if (score >= 70) return '#4ade80';
  if (score >= 40) return '#fbbf24';
  return '#f87171';
}

function renderResult(r) {
  const cls = recClass(r.recommendation);
  const itemTypeLabel = {
    autografada: 'Autografada', match_worn: 'Match Worn', retro: 'Retrô/Original',
    player_issue: 'Player Issue', desconhecido: 'Não identificado',
  }[r.item_type] || r.item_type;

  let priceHtml = '';
  if (r.recommendation === 'VERIFICAR' && r.offer_max === 0) {
    priceHtml = `
      <div class="price-row">
        <div class="price-box">
          <div class="k">Valor de mercado (ref.)</div>
          <div class="v">${fmtBRL(r.sell_price_estimate)}</div>
        </div>
        <div class="price-box offer">
          <div class="k">Oferta</div>
          <div class="v" style="color:var(--red); font-size:14px;">Não recomendada</div>
        </div>
      </div>`;
  } else {
    priceHtml = `
      <div class="price-row">
        <div class="price-box">
          <div class="k">Valor de mercado</div>
          <div class="v">${fmtBRL(r.sell_price_estimate)}</div>
        </div>
        <div class="price-box offer">
          <div class="k">Oferta sugerida</div>
          <div class="v">${fmtBRL(r.offer_min)}–${fmtBRL(r.offer_max)}</div>
        </div>
      </div>`;
  }

  const badges = [];
  if (r.is_autographed) badges.push(`<span class="mini-badge ${r.signature_looks_genuine === false ? 'warn' : 'ok'}">✍️ Autógrafo ${r.signature_looks_genuine === false ? '(suspeito)' : r.signature_looks_genuine ? '(parece genuíno)' : ''}</span>`);
  if (r.is_match_worn) badges.push(`<span class="mini-badge ok">👕 Match Worn</span>`);
  if (r.has_coa) badges.push(`<span class="mini-badge ok">📜 COA</span>`);
  if (r.replica_suspicion) badges.push(`<span class="mini-badge warn">⚠️ Suspeita de réplica</span>`);
  if (!badges.length) badges.push(`<span class="mini-badge neutral">Sem sinais especiais</span>`);

  const comps = r.comparables || [];
  const compHtml = comps.length
    ? `<div class="comp-list">${comps.map(c => `
        <a class="comp-item" href="${c.url}" target="_blank" rel="noopener">
          <div class="comp-info">
            <div class="comp-title">${c.title}</div>
            <div class="comp-meta">${c.platform}${c.source === 'vinted_live' ? ' · disponível agora' : ' · visto no radar'}</div>
          </div>
          <div class="comp-price">${fmtBRL(c.price)}</div>
        </a>`).join('')}</div>`
    : `<div class="comp-empty">Nenhuma camisa parecida encontrada no radar ou no Vinted agora.</div>`;

  currentEvaluationId = r.evaluation_id;

  document.getElementById('result').innerHTML = `
    <div class="rec-banner ${cls}">
      <div>
        <div class="rec-label">${r.recommendation}</div>
        <div class="rec-reason">${r.recommendation_reason}</div>
      </div>
    </div>
    ${priceHtml}
    <div class="info-card">
      <div class="info-row"><span class="lbl">Jogador</span><span class="val">${r.player_name || '—'}</span></div>
      <div class="info-row"><span class="lbl">Clube/Seleção</span><span class="val">${r.club || '—'}</span></div>
      <div class="info-row"><span class="lbl">Época</span><span class="val">${r.year_era || '—'}</span></div>
      <div class="info-row"><span class="lbl">Tipo</span><span class="val">${itemTypeLabel}</span></div>
      <div class="info-row"><span class="lbl">Condição</span><span class="val" style="text-transform:capitalize">${r.condition}</span></div>
      <div class="info-row">
        <span class="lbl">Autenticidade</span>
        <span class="val">${r.authenticity_score}/100</span>
      </div>
      <div class="auth-bar-wrap">
        <div class="auth-bar-track"><div class="auth-bar-fill" style="width:${r.authenticity_score}%; background:${authColor(r.authenticity_score)}"></div></div>
      </div>
      <div class="badge-row">${badges.join('')}</div>
      ${r.ai_notes ? `<div class="notes-box">${r.ai_notes}</div>` : ''}
      ${r.identified_text ? `<div class="notes-box"><b>Texto identificado:</b> ${r.identified_text}</div>` : ''}
    </div>

    <div class="section-title" style="margin-top:16px;">Camisas parecidas</div>
    ${compHtml}

    <div class="section-title" style="margin-top:16px;">Pergunte mais sobre essa camisa</div>
    <div class="ask-box">
      <div class="qa-thread" id="qa-thread"></div>
      <div class="ask-row">
        <input id="ask-input" type="text" placeholder="Ex: parece original de 1994 ou reedição?" onkeydown="if(event.key==='Enter'){event.preventDefault();askQuestion();}">
        <button class="ask-send" id="ask-send" onclick="askQuestion()">Perguntar</button>
      </div>
    </div>

    <button class="btn-reset" onclick="resetCapture()">Nova avaliação</button>
  `;
  document.getElementById('result').classList.add('show');
  document.getElementById('result').scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function appendQA(question, answer) {
  const thread = document.getElementById('qa-thread');
  if (!thread) return;
  const item = document.createElement('div');
  item.className = 'qa-item';
  item.innerHTML = `<div class="qa-q">${question}</div><div class="qa-a">${answer}</div>`;
  thread.appendChild(item);
}

async function askQuestion() {
  const input = document.getElementById('ask-input');
  const btn = document.getElementById('ask-send');
  const question = (input.value || '').trim();
  if (!question || !currentEvaluationId) return;

  btn.disabled = true;
  const prevLabel = btn.textContent;
  btn.textContent = '...';

  const body = new FormData();
  body.append('question', question);

  try {
    const r = await fetch(`/scout/api/evaluation/${currentEvaluationId}/ask`, { method: 'POST', body });
    const j = await r.json();
    if (r.ok && j.ok !== false) {
      appendQA(j.question, j.answer);
      input.value = '';
    } else {
      showError(j.detail || 'Erro ao perguntar. Tente de novo.');
    }
  } catch (e) {
    showError('Erro de conexão ao perguntar.');
  } finally {
    btn.disabled = false;
    btn.textContent = prevLabel;
  }
}

function resetCapture() {
  photos = [];
  currentEvaluationId = null;
  document.getElementById('user-notes').value = '';
  document.getElementById('result').classList.remove('show');
  document.getElementById('result').innerHTML = '';
  renderGrid();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ── Init ──
renderGrid();
updateTally();
if (sessionId) {
  const btn = document.getElementById('btn-session');
  btn.textContent = 'Encerrar visita';
  btn.classList.add('ghost');
  document.getElementById('collector-name').disabled = true;
}

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/scout/sw.js').catch(() => {});
}
</script>
</body>
</html>
